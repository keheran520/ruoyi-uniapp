<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #captcha-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
        }
        
        .captcha-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .captcha-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        #tac-captcha-box {
            min-height: 300px;
            width: 100%;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div id="captcha-container">
        <div class="captcha-header">
            <div class="captcha-title">安全验证</div>
        </div>
        <div id="tac-captcha-box">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="./load.min.js"></script>
    <script>
        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 获取配置参数
        const apiBase = getQueryParam('apiBase') || '/dev-api';
        const tenantId = getQueryParam('tenantId') || '000000';

        console.log('验证码页面参数:', { apiBase, tenantId });

        // 向uni-app发送消息
        function postMessageToUniApp(data) {
            console.log('发送消息到uni-app:', data);
            
            // 尝试多种方式发送消息
            try {
                // 方式1: uni.postMessage (H5)
                if (window.uni && window.uni.postMessage) {
                    window.uni.postMessage({
                        data: data
                    });
                }
                
                // 方式2: parent.postMessage (iframe)
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(data, '*');
                }
                
                // 方式3: webkit.messageHandlers (iOS)
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.uniPostMessage) {
                    window.webkit.messageHandlers.uniPostMessage.postMessage(data);
                }
                
                // 方式4: Android
                if (window.UniAppJSBridge) {
                    window.UniAppJSBridge.postMessage(data);
                }
            } catch (error) {
                console.error('发送消息失败:', error);
            }
        }

        // 初始化TAC
        async function initCaptcha() {
            try {
                // 检查是否加载了TAC SDK
                if (!window.initTAC) {
                    throw new Error('TAC SDK未加载');
                }

                const config = {
                    requestCaptchaDataUrl: apiBase + '/captcha/gen',
                    validCaptchaUrl: apiBase + '/captcha/check',
                    bindEl: '#tac-captcha-box',
                    validSuccess: function(res, c, tac) {
                        console.log('验证成功', res, c);
                        
                        // 获取验证码ID
                        const captchaId = res?.data || c?.id || c?.currentCaptchaData?.id || '';
                        console.log('获取到的captchaId:', captchaId);
                        
                        // 通知 uni-app
                        postMessageToUniApp({
                            type: 'captcha_success',
                            captchaId: captchaId
                        });
                        
                        // 延迟关闭
                        setTimeout(() => {
                            tac.destroyWindow();
                        }, 500);
                    },
                    validFail: function(res, c, tac) {
                        console.log('验证失败', res);
                        tac.reloadCaptcha();
                    },
                    btnRefreshFun: function(el, tac) {
                        console.log('刷新验证码');
                        tac.reloadCaptcha();
                    },
                    btnCloseFun: function(el, tac) {
                        console.log('关闭验证码');
                        tac.destroyWindow();
                        
                        // 通知 uni-app 关闭
                        postMessageToUniApp({
                            type: 'captcha_close'
                        });
                    }
                };

                const style = {
                    logoUrl: null
                };

                console.log('开始初始化TAC...');
                const tac = await window.initTAC('/tac', config, style);
                tac.init();
                console.log('TAC初始化成功');
            } catch (error) {
                console.error('初始化TAC失败', error);
                document.getElementById('tac-captcha-box').innerHTML = 
                    '<div class="error">加载失败，请刷新重试<br>' + error.message + '</div>';
            }
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCaptcha);
        } else {
            initCaptcha();
        }
    </script>
</body>
</html>
